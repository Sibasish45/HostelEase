<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Leave Applications</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 700px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 22px;
            color: #444;
            font-weight: 600;
        }

        .application-list {
            list-style: none;
            padding: 0;
        }

        .application-item {
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 5px solid #3a57e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .application-item p {
            margin: 5px 0;
            font-size: 14px;
        }

        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .reply-btn {
            background: #3a57e8;
            color: white;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .reply-section {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #eef2ff;
            border-radius: 8px;
        }

        .reply-section.active {
            display: block;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .container {
                width: 90%;
            }
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #121212;

            padding: 20px;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.05) 0,
                rgba(255, 255, 255, 0.05) 200px,
                transparent 200px,
                transparent 400px
            ),
            repeating-linear-gradient(
                -45deg,
                rgba(255, 255, 255, 0.05) 0,
                rgba(255, 255, 255, 0.05) 200px,
                transparent 200px,
                transparent 400px
            );
            background-size: 400px 400px;
            z-index: 0;
            pointer-events: none;
            opacity: 0.2;
        }
        body::before {
        content: "HostelEase";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 50px;
        font-weight: bold;
        color: white; /* Light opacity for watermark effect */
        z-index: 0;
        pointer-events: none;
        white-space: nowrap;
    }
    .back-button {
  position: fixed;
  top: 14%;
  left: 0;
  transform: translateY(-50%);
  padding: 10px 18px;
  background-image: linear-gradient(to right, #000000, #003575);
  color: white;
  text-decoration: none;
  font-size: 1em;
  border-radius: 0px 8px 8px 0px; /* Rounded only on the right side */
  transition: background 0.3s;
}

.back-button:hover {
  background-image: linear-gradient(to right, #003575, #000000);
}
    </style>
</head>
<body>
    <div class="container">
        <h2>Student Leave Applications</h2>
        <ul id="applicationList" class="application-list"></ul>

        <div id="replySection" class="reply-section">
            <h3>Reply to Application</h3>
            <textarea id="replyMessage" rows="3" placeholder="Enter your reply"></textarea>
            <button id="sendReplyBtn" class="btn reply-btn">Send Reply</button>
        </div>
    </div>
    <a href="admin_statistics.html" class="back-button">← Back</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getDatabase, ref, get, update, remove } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1Kg-1hFmiEvKp8QwyxKh9GctrqEPm9Gk",
            authDomain: "learningproject1-8cd8a.firebaseapp.com",
            projectId: "learningproject1-8cd8a",
            storageBucket: "learningproject1-8cd8a.appspot.com",
            messagingSenderId: "111895053885",
            appId: "1:111895053885:web:63928897a46241ed2ecc54",
            measurementId: "G-DH8QVL8EG5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function loadApplications() {
            const applicationsRef = ref(db, 'leaveApplications/');
            get(applicationsRef).then((snapshot) => {
                const applicationList = document.getElementById("applicationList");
                applicationList.innerHTML = '';

                if (snapshot.exists()) {
                    const applications = snapshot.val();
                    Object.keys(applications).forEach(key => {
                        const application = applications[key];
                        const item = document.createElement("li");
                        item.className = "application-item";
                        item.innerHTML = `
                            <div>
                                <p><strong>Name:</strong> ${application.studentName}</p>
                                <p><strong>Roll No:</strong> ${application.rollNo}</p>
                                <p><strong>Leave:</strong> ${application.startDate} to ${application.endDate}</p>
                                <p><strong>Reason:</strong> ${application.reason}</p>
                            </div>
                            <div>
                                <button class="btn reply-btn" data-id="${key}">Reply</button>
                                <button class="btn delete-btn" data-id="${key}">Remove</button>
                            </div>
                        `;
                        applicationList.appendChild(item);
                    });

                    document.querySelectorAll('.reply-btn').forEach(button => {
                        button.addEventListener('click', function() {
                            showReplySection(this.getAttribute('data-id'));
                        });
                    });

                    document.querySelectorAll('.delete-btn').forEach(button => {
                        button.addEventListener('click', function() {
                            removeApplication(this.getAttribute('data-id'));
                        });
                    });
                } else {
                    applicationList.innerHTML = '<p>No applications available.</p>';
                }
            }).catch(error => {
                console.error("Error loading applications:", error);
                alert("Failed to load applications.");
            });
        }

        function showReplySection(applicationId) {
            const replySection = document.getElementById("replySection");
            replySection.classList.add('active');

            document.getElementById("sendReplyBtn").onclick = function() {
                const replyMessage = document.getElementById("replyMessage").value.trim();
                if (!replyMessage) {
                    alert("Please enter a reply.");
                    return;
                }

                update(ref(db, `leaveApplications/${applicationId}`), { reply: replyMessage })
                .then(() => {
                    alert("Reply sent successfully!");
                    document.getElementById("replyMessage").value = '';
                    replySection.classList.remove('active');
                    loadApplications();
                })
                .catch(error => {
                    console.error("Error sending reply:", error);
                    alert("Failed to send reply.");
                });
            };
        }

        function removeApplication(applicationId) {
            if (confirm("Are you sure you want to remove this application?")) {
                remove(ref(db, `leaveApplications/${applicationId}`))
                .then(() => {
                    alert("Application removed successfully!");
                    loadApplications();
                })
                .catch(error => {
                    console.error("Error removing application:", error);
                    alert("Failed to remove application.");
                });
            }
        }

        document.addEventListener('DOMContentLoaded', loadApplications);
    </script>
</body>
</html>
