<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Mess Timetable</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: burlywood;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
      
        .timetable-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 800px;
            width: 100%;
            margin: auto;
        }
        select, table {
            margin: 20px 0;
            padding: 15px;
            font-size: 1.2em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 15px;
            font-size:1.1em;
        }
        th {
            background-color: #f4f4f4;
            font-size:1.2em;
        }
    </style>
</head>
<body>
    <div class="timetable-container">
        <h1>Class Timetable  CSE-B</h1>
        <label for="day-select">Select Day:</label>
        <select id="day-select">
            <option value="">--Select--</option>
            <option value="monday">Monday</option>
            <option value="tuesday">Tuesday</option>
            <option value="wednesday">Wednesday</option>
            <option value="thursday">Thursday</option>
            <option value="friday">Friday</option>
            <option value="saturday">Saturday</option>            
        </select>
        <div id="timetable" style="display:none;">
            <h2 id="day-title"></h2>
            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Time</th>
                        <th>Type</th>
                        <th>Faculty</th>
                        <th>Venue</th>


                    </tr>
                </thead>
                <tbody id="timetable-body">
                </tbody>
            </table>
        </div>
    </div>
    <script>
        const timetables = {
            monday: [
                {Subject: 'DM ',Type:'THEORY', Time: '8:00 AM - 9.00 AM', Faculty:'Dr.Madhusudan Patro',Location:'RDB-01'},
                {Subject: 'IDS ',Type:'THEORY', Time: '9:00 AM - 10.00 AM', Faculty:'Mr.Tirupati Sahu',Location:'RDB-01'},
                {Subject: 'ICSCT',Type:'THEORY', Time: '10:20 AM - 11.20 AM', Faculty:'Mr.Amlan Asutosh',Location:'RDB-01'},
                {Subject: 'OOPS',Type:'LAB', Time: '11:20 AM - 12.20 AM', Faculty:'Mr.Santosh Kumar Panda',Location:'Lab-3'},
                {Subject: 'OOPS',Type:'LAB', Time: '12:20 AM - 1.20 PM', Faculty:'Mr.Santosh Kumar Panda',Location:'Lab-3'},
            ],
            tuesday: [
            {Subject: 'DE ',Type:'THEORY', Time: '8:00 AM - 9.00 AM', Faculty:'Mrs.Padmini Mishra',Location:'RDB-01'},
                {Subject: 'DE ',Type:'THEORY', Time: '9:00 AM - 10.00 AM', Faculty:'Mrs.Padmini Mishra',Location:'RDB-01'},
                {Subject: 'MATHEMATICS',Type:'THEORY', Time: '10:20 AM - 11.20 AM', Faculty:'Dr.Madhusudan Patro',Location:'RDB-01'},
                {Subject: 'DBMS',Type:'Lab', Time: '11:20 AM - 12.20 AM', Faculty:'Mr. Rakesh Sahu',Location:'RDB-01'},
                {Subject: 'DBMS ',Type:'Lab', Time: '12:20 AM - 1.20 PM', Faculty:'Mr. Rakesh Sahu',Location:'RDB-01'},
            ],
            wednesday: [
            {Subject: 'OOPS ',Type:'THEORY', Time: '8:00 AM - 9.00 AM', Faculty:'Mr.Santosh Kumar Panda',Location:'RDB-01'},
                {Subject: 'OOPS ',Type:'THEORY', Time: '9:00 AM - 10.00 AM', Faculty:'Mr.Santosh Kumar Panda',Location:'RDB-01'},
                {Subject: 'DE',Type:'THEORY', Time: '10:20 AM - 11.20 AM', Faculty:'Mrs.Padmini Mishra',Location:'RDB-01'},
                {Subject: 'DE ',Type:'THEORY', Time: '11:20 AM - 12.20 AM', Faculty:'Mrs.Padmini Mishra',Location:'RDB-01'},
                {Subject: 'IDS ',Type:'THEORY', Time: '12:20 AM - 1.20 PM', Faculty:'Mr.Tirupati Sahu',Location:'RDB-01'},
            ],
            thursday: [
            {Subject: 'DBMS ',Type:'Lab', Time: '8:00 AM - 9.00 AM', Faculty:'Mr.Santosh Kumar Panda',Location:'RDB-01'},
                {Subject: 'DBMS ',Type:'Lab', Time: '9:00 AM - 10.00 AM', Faculty:'Mr.Santosh Kumar Panda',Location:'RDB-01'},
                {Subject: 'IDS',Type:'THEORY', Time: '10:20 AM - 11.20 AM', Faculty:'Mr.Tirupati Sahu',Location:'RDB-01'},
                {Subject: 'DE ',Type:'THEORY', Time: '11:20 AM - 12.20 AM', Faculty:'Mr.Radhanath Patro',Location:'RDB-01'},
                {Subject: 'IDS ',Type:'THEORY', Time: '12:20 AM - 1.20 PM', Faculty:'Mr.Tirupati Sahu',Location:'RDB-01'},
            ],
            friday: [
            {Subject: 'DBMS ',Type:'Lab', Time: '8:00 AM - 9.00 AM', Faculty:'Mr.Radhanath Patro',Location:'RDB-01'},
                {Subject: 'DBMS ',Type:'Lab', Time: '9:00 AM - 10.00 AM', Faculty:'Mr.Radhanath Patro',Location:'RDB-01'},
                {Subject: 'DE',Type:'THEORY', Time: '10:20 AM - 11.20 AM', Faculty:'Mr.Radhanath Patro',Location:'RDB-01'},
                {Subject: 'DE ',Type:'THEORY', Time: '11:20 AM - 12.20 AM', Faculty:'Mr.Radhanath Patro',Location:'RDB-01'},
                {Subject: 'IDS ',Type:'THEORY', Time: '12:20 AM - 1.20 PM', Faculty:'Mr.Tirupati Sahu',Location:'RDB-01'},
            ],
            saturday: [
            {Subject: 'DBMS ',Type:'Lab', Time: '8:00 AM - 9.00 AM', Faculty:'Mrs.Sandhyarani Biswal',Location:'RDB-01'},
                {Subject: 'DBMS ',Type:'Lab', Time: '9:00 AM - 10.00 AM', Faculty:'Mrs.Sandhyarani Biswal',Location:'RDB-01'},
                {Subject: 'DE',Type:'THEORY', Time: '10:20 AM - 11.20 AM', Faculty:'Mr.Radhanath Patro',Location:'RDB-01'},
                {Subject: 'DE ',Type:'THEORY', Time: '11:20 AM - 12.20 AM', Faculty:'Mr.Radhanath Patro',Location:'RDB-01'},
                
            ],
        };

        document.getElementById('day-select').addEventListener('change', function () {
            const selectedDay = this.value;
            const timetableDiv = document.getElementById('timetable');
            const dayTitle = document.getElementById('day-title');
            const timetableBody = document.getElementById('timetable-body');
            
            if (selectedDay) {
                timetableDiv.style.display = 'block';
                dayTitle.innerText = selectedDay.charAt(0).toUpperCase() + selectedDay.slice(1);
                timetableBody.innerHTML = '';
                timetables[selectedDay].forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${item.Subject}</td>
                        <td>${item.Time}</td>
                        <td>${item.Type}</td>
                        <td>${item.Faculty}</td>
                        <td>${item.Venue}</td>
                    `;
                    timetableBody.appendChild(row);
                });
            } else {
                timetableDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
