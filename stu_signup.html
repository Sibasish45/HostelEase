<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registration Page</title>
    <link rel="stylesheet" href="login.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

<header class="header">
    <nav class="navbar">
        <a href="#">Home</a>
        <a href="#">About Us</a>
        <a href="#">Contact Us</a>
    </nav>
    <form action="#" class="search-bar">
        <input type="text" placeholder="Search...">
        <button type="submit"><i class='bx bx-search'></i></button>
    </form>
</header>

<div class="background"></div>
<div class="container">
    <div class="content">
        <h2><b>HostelEase</b></h2>
        <div class="text_sci">
            <h3>Welcome<br> <span>to the Website</span></h3>
        </div>
    </div>

    <div class="logreg_box">
        <div class="form_box login">
            <form id="signupForm" action="#">
                <h2>Student Sign Up</h2>
                <div class="input_box">
                    <span class="icon"><i class='bx bx-user'></i></span>
                    <input type="text" id="Name" required>
                    <label>Enter Name</label>
                </div>
                <div class="input_box">
                    <span class="icon"><i class='bx bx-user'></i></span>
                    <input type="text" id="Rollno" required>
                    <label>Enter Roll Number</label>
                </div>
                <div class="input_box">
                    <span class="icon"><i class='bx bx-envelope'></i></span>
                    <input type="email" id="email" required>
                    <label>Enter Email</label>
                </div>
                <div class="input_box">
                    <span class="icon"><i class='bx bx-lock-alt'></i></span>
                    <input type="password" id="password" required>
                    <label>Create Password</label>
                </div>
                
                <div class="remember_forgot">
                    <label><input type="checkbox">Remember Me</label>
                </div>
                <button type="submit" class="btn">Sign Up</button>
                
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1Kg-1hFmiEvKp8QwyxKh9GctrqEPm9Gk",
        authDomain: "learningproject1-8cd8a.firebaseapp.com",
        databaseURL: "https://learningproject1-8cd8a-default-rtdb.firebaseio.com/",
        projectId: "learningproject1-8cd8a",
        storageBucket: "learningproject1-8cd8a.appspot.com",
        messagingSenderId: "111895053885",
        appId: "1:111895053885:web:63928897a46241ed2ecc54",
        measurementId: "G-DH8QVL8EG5"
    };

    const app1 = initializeApp(firebaseConfig, "app1");
    const db1 = getDatabase(app1);

    document.getElementById("signupForm").addEventListener('submit', function(e) {
        e.preventDefault();

        const name = document.getElementById("Name").value;
        const Rollno = document.getElementById("Rollno").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const dbRef = ref(db1);

        get(child(dbRef, 'student')).then((snapshot) => {
            if (snapshot.exists()) {
                const students = snapshot.val();
                let rollnoExists = false;

                for (let key in students) {
                    if (students[key].Rollno === Rollno) {
                        rollnoExists = true;
                        break;
                    }
                }

                if (rollnoExists) {
                    alert("This Roll Number is already registered. Please use a different Roll Number.");
                } else {
                    set(ref(db1, 'student/' + Rollno), {
                        username: name,
                        Rollno: Rollno,
                        email: email,
                        password: password
                    })
                    .then(() => {
                        alert("Registration Successful");
                        document.getElementById("signupForm").reset();
                    })
                    .catch((error) => {
                        console.error("Error registering user:", error);
                        alert("Registration failed. Please try again.");
                    });
                }
            } else {
                set(ref(db1, 'student/' + Rollno), {
                    username: name,
                    Rollno: Rollno,
                    email: email,
                    password: password
                })
                .then(() => {
                    alert("Registration Successful");
                    document.getElementById("signupForm").reset();
                })
                .catch((error) => {
                    console.error("Error registering user:", error);
                    alert("Registration failed. Please try again.");
                });
            }
        }).catch((error) => {
            console.error("Error fetching students:", error);
            alert("An error occurred. Please try again.");
        });
    });
</script>

</body>
</html>
