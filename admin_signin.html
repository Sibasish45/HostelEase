<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostelEase Admin Portal</title>
    <link rel="stylesheet" href="login.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <div class="content">
            <div class="logo-container">
                <h2><b>HostelEase</b></h2>
                <p class="tagline">Simplifying Hostel Management</p>
            </div>
            <div class="features">
                <div class="feature">
                    <i class='bx bx-check-shield feature-icon'></i>
                    <span>Secure Access</span>
                </div>
                <div class="feature">
                    <i class='bx bx-data feature-icon'></i>
                    <span>Complete Dashboard</span>
                </div>
                <div class="feature">
                    <i class='bx bx-support feature-icon'></i>
                    <span>24/7 Support</span>
                </div>
            </div>
        </div>
        <div class="logreg_box">
            <div class="form_box login">
                <form id="loginForm" action="#">
                    <h2>Admin Portal</h2>
                    <p class="form-subtitle">Sign in to access your dashboard</p>
                    
                    <div class="input_box">
                        <span class="icon"><i class='bx bx-user'></i></span>
                        <input type="text" id="id" required>
                        <label>Admin ID</label>
                    </div>
                    <div class="input_box">
                        <span class="icon"><i class='bx bx-envelope'></i></span>
                        <input type="email" id="loginEmail" required>
                        <label>Email Address</label>
                    </div>
                    <div class="input_box">
                        <span class="icon"><i class='bx bx-lock-alt'></i></span>
                        <input type="password" id="loginPassword" required>
                        <label>Password</label>
                    </div>
                    
                    <div class="login-options">
                        <div class="checkbox">
                            <label><input type="checkbox">Remember Me</label>
                        </div>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="animated-button">
                        <span class="btn-text">Sign In</span>
                        <i class='bx bx-right-arrow-alt btn-icon'></i>
                    </button>
                    
                    <div class="login_register">
                        <p>Don't have an account? <a href="admin_signup.html" class="register_link">Sign Up</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <a href="index.html" class="back-button">
        <i class='bx bx-left-arrow-alt'></i> Back to Home
    </a>
    
    <!-- Terminal Loader -->
    <div id="terminal-loader" class="terminal-loader">
        <div class="terminal-header">
            <span class="terminal-title">Authenticating...</span>
            <div class="terminal-controls">
                <span class="control close"></span>
                <span class="control minimize"></span>
                <span class="control maximize"></span>
            </div>
        </div>
        <div class="text">Verifying credentials...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1Kg-1hFmiEvKp8QwyxKh9GctrqEPm9Gk",
            authDomain: "learningproject1-8cd8a.firebaseapp.com",
            databaseURL: "https://learningproject1-8cd8a-default-rtdb.firebaseio.com/",
            projectId: "learningproject1-8cd8a",
            storageBucket: "learningproject1-8cd8a.appspot.com",
            messagingSenderId: "111895053885",
            appId: "1:111895053885:web:63928897a46241ed2ecc54",
            measurementId: "G-DH8QVL8EG5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById("loginForm").addEventListener('submit', function(e) {
            e.preventDefault();

            // Show the loader
            const loader = document.getElementById("terminal-loader");
            loader.style.display = "block";

            const adminId = document.getElementById("id").value;
            const adminEmail = document.getElementById("loginEmail").value;
            const adminPassword = document.getElementById("loginPassword").value;

            const dbRef = ref(db);
            get(child(dbRef, `admin/${adminId}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    const adminData = snapshot.val();
                    if (adminData.email === adminEmail && adminData.password === adminPassword) {
                        sessionStorage.setItem("id", adminId);

                        // Wait for 2 seconds before redirecting
                        setTimeout(() => {
                            loader.style.display = "none";
                            window.location.href = "admindashboard.html"; 
                        }, 2000);
                    } else {
                        loader.style.display = "none"; // Hide loader
                        showNotification("Invalid email or password", "error");
                    }
                } else {
                    loader.style.display = "none"; // Hide loader
                    showNotification("No admin found with the given ID", "error");
                }
            }).catch((error) => {
                loader.style.display = "none"; // Hide loader
                console.error("Error during login:", error);
                showNotification("Login failed. Please try again.", "error");
            });
        });

        // Notification function
        function showNotification(message, type) {
            const notification = document.createElement("div");
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <i class='bx ${type === "error" ? "bx-x-circle" : "bx-check-circle"}'></i>
                <span>${message}</span>
            `;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.add("show");
            }, 10);
            
            setTimeout(() => {
                notification.classList.remove("show");
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
