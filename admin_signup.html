<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sign Up</title>
    <link rel="stylesheet" href="login.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
<header class="header">
    <nav class="navbar">
        <a href="#">Home</a>
        <a href="#">About us</a>
        <a href="#">Contact Us</a>
    </nav>
    <form action="#" class="search-bar">
        <input type="text" placeholder="Search...">
        <button type="submit"><i class='bx bx-search'></i></button>
    </form>
</header>
<div class="background"></div>
<div class="container">
    <div class="content">
        <h2><b>HostelEase</b></h2>
        
    </div>
    <div class="logreg_box">
        <div class="form_box login">
            <form id="signupForm" action="#">
                <h2>Admin Sign Up</h2>
                <div class="input_box">
                    <span class="icon"><i class='bx bx-user'></i></span>
                    <input type="text" id="Name" required>
                    <label>Enter Name</label>
                </div>
                <div class="input_box">
                    <span class="icon"><i class='bx bx-user'></i></span>
                    <input type="text" id="id" required>
                    <label>Create Admin Id</label>
                </div>
                <div class="input_box">
                    <span class="icon"><i class='bx bx-envelope'></i></span>
                    <input type="email" id="email" required>
                    <label>Enter Email</label>
                </div>
                <div class="input_box">
                    <span class="icon"><i class='bx bx-lock-alt'></i></span>
                    <input type="password" id="password" required>
                    <label>Create Password</label>
                </div>
                <div class="remember_forgot">
                    <label><input type="checkbox">Remember Me</label>
                </div>
                <button type="submit" class="animated-button">Sign Up</button>
                <div class="login_register">
                    <p>Already have an account? <a href="admin_signin.html" class="register_link">Sign In</a></p>
                </div>
            </form>
        </div>
    </div>
</div>
<a href="index.html" class="back-button">← Back</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyB1Kg-1hFmiEvKp8QwyxKh9GctrqEPm9Gk",
        authDomain: "learningproject1-8cd8a.firebaseapp.com",
        databaseURL: "https://learningproject1-8cd8a-default-rtdb.firebaseio.com/",
        projectId: "learningproject1-8cd8a",
        storageBucket: "learningproject1-8cd8a.appspot.com",
        messagingSenderId: "111895053885",
        appId: "1:111895053885:web:63928897a46241ed2ecc54",
        measurementId: "G-DH8QVL8EG5"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.getElementById("signupForm").addEventListener('submit', function(e) {
        e.preventDefault();
        
        const adminName = document.getElementById("Name").value;
        const adminId = document.getElementById("id").value;
        const adminEmail = document.getElementById("email").value;
        const adminPassword = document.getElementById("password").value;
        
        // Check if password meets the minimum length requirement
        if (adminPassword.length < 6) {
            alert("Password must be at least 6 characters long.");
            return;
        }

        const adminRef = ref(db, 'admin/' + adminId);
        get(adminRef).then((snapshot) => {
            if (snapshot.exists()) {
                alert("User Already Exists with this ID.");
            } else {
                set(adminRef, {
                    name: adminName,
                    id: adminId,
                    email: adminEmail,
                    password: adminPassword
                })
                .then(() => {
                    alert("Admin registered successfully!");
                    document.getElementById("signupForm").reset();
                })
                .catch((error) => {
                    console.error("Error during signup:", error);
                    alert("Registration failed!");
                });
            }
        }).catch((error) => {
            console.error("Error checking admin ID:", error);
            alert("Error checking admin ID.");
        });
    });
</script>
</body>
</html>
