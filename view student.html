<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - View Student Details</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .wrapper {
            width: 90%;
            max-width: 1200px;
            padding: 20px;
            background-color: #ecf0f1;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            margin: 30px 0;
        }
        .main-content {
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .dashboard-header h2 {
            margin: 0;
            font-size: 24px;
            color: #34495e;
        }
        .search-container {
            display: flex;
            margin-bottom: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            min-width: 200px;
        }
        .search-button {
            padding: 10px 15px;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .search-button:hover {
            background-color: #2c3e50;
        }
        .clear-button {
            padding: 10px 15px;
            background-color: #95a5a6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .clear-button:hover {
            background-color: #7f8c8d;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            background: #34495e;
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #2c3e50;
        }
        .student-table-container {
            overflow-x: auto;
            margin-top: 20px;
        }
        .student-table {
            width: 100%;
            border-collapse: collapse;
        }
        .student-table th, .student-table td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }
        .student-table th {
            background-color: #34495e;
            color: white;
            position: sticky;
            top: 0;
        }
        .student-table td {
            background-color: #f9f9f9;
        }
        .student-table tr:nth-child(even) td {
            background-color: #f0f0f0;
        }
        .student-table tr:hover td {
            background-color: #e3f2fd;
        }
        .no-results {
            text-align: center;
            padding: 30px;
            color: #7f8c8d;
            font-style: italic;
            background-color: #f9f9f9;
            border-radius: 4px;
            margin-top: 20px;
        }
        .highlight {
            background-color: #fff9c4;
            font-weight: bold;
            padding: 2px;
            border-radius: 2px;
        }
        .loading {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #34495e;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        .export-button {
            padding: 10px 15px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .export-button:hover {
            background-color: #219653;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 5px;
        }
        .edit-btn, .delete-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .edit-btn {
            background-color: #3498db;
        }
        .edit-btn:hover {
            background-color: #2980b9;
        }
        .delete-btn {
            background-color: #e74c3c;
        }
        .delete-btn:hover {
            background-color: #c0392b;
        }
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .status-active {
            background-color: #2ecc71;
        }
        .status-inactive {
            background-color: #e74c3c;
        }
        .filter-options {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .filter-select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .pagination button {
            padding: 8px 12px;
            border: 1px solid #ddd;
            background-color: white;
            cursor: pointer;
            border-radius: 4px;
        }
        .pagination button.active {
            background-color: #34495e;
            color: white;
            border-color: #34495e;
        }
        .pagination button:hover:not(.active) {
            background-color: #f1f1f1;
        }
        .pagination button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media screen and (max-width: 768px) {
            .wrapper {
                width: 95%;
                padding: 15px;
                margin: 50px 0;
            }
            .student-table th, .student-table td {
                padding: 8px;
                font-size: 14px;
            }
            .back-btn {
                top: 10px;
                left: 10px;
                padding: 6px 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <a href="admindashboard.html" class="back-btn">
            <i class='bx bx-arrow-back'></i>Back to Dashboard
        </a>
        
        <div class="main-content">
            <div class="dashboard-header">
                <h2>View Student Details</h2>
                <button id="export-button" class="export-button">
                    <i class='bx bx-download'></i> Export to CSV
                </button>
            </div>
            
            <div class="filter-options">
                <select id="gender-filter" class="filter-select">
                    <option value="">All Genders</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
                <select id="sort-by" class="filter-select">
                    <option value="rollNumber">Sort by Roll Number</option>
                    <option value="username">Sort by Name</option>
                </select>
            </div>
            
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="Search by roll number (23CSE209) or name..." />
                <button id="search-button" class="search-button">
                    <i class='bx bx-search'></i> Search
                </button>
                <button id="clear-button" class="clear-button">
                    <i class='bx bx-x'></i> Clear
                </button>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Loading student data...</p>
            </div>

            <div class="student-table-container">
                <table class="student-table">
                    <thead>
                        <tr>
                            <th>Roll Number</th>
                            <th>Registration Number</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Mobile</th>
                            <th>Gender</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="student-details">
                    </tbody>
                </table>
            </div>
            
            <div id="no-results" class="no-results" style="display: none;">
                <i class='bx bx-search' style="font-size: 24px; margin-bottom: 10px;"></i>
                <p>No students found matching your search criteria.</p>
            </div>
            
            <div class="pagination" id="pagination">
                <!-- Pagination buttons will be added here -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB1Kg-1hFmiEvKp8QwyxKh9GctrqEPm9Gk",
            authDomain: "learningproject1-8cd8a.firebaseapp.com",
            databaseURL: "https://learningproject1-8cd8a-default-rtdb.firebaseio.com/",
            projectId: "learningproject1-8cd8a",
            storageBucket: "learningproject1-8cd8a.appspot.com",
            messagingSenderId: "111895053885",
            appId: "1:111895053885:web:63928897a46241ed2ecc54",
            measurementId: "G-DH8QVL8EG5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Store all students data
        let allStudents = [];
        let filteredStudents = [];
        let currentPage = 1;
        const rowsPerPage = 10;
        
        // DOM elements
        const loadingDiv = document.getElementById('loading');
        const studentTableContainer = document.querySelector('.student-table-container');
        const noResultsDiv = document.getElementById('no-results');
        const paginationDiv = document.getElementById('pagination');
        
        // Initially hide the table until data is loaded
        studentTableContainer.style.display = 'none';

        // Function to fetch student details
        function fetchStudentDetails() {
            const studentsRef = ref(db, 'student_register');
            
            loadingDiv.style.display = 'block';
            studentTableContainer.style.display = 'none';
            noResultsDiv.style.display = 'none';
            
            onValue(studentsRef, (snapshot) => {
                allStudents = [];
                
                if (!snapshot.exists()) {
                    loadingDiv.style.display = 'none';
                    noResultsDiv.style.display = 'block';
                    return;
                }
                
                snapshot.forEach((childSnapshot) => {
                    const student = childSnapshot.val();
                    student.key = childSnapshot.key; // Store the Firebase key for update/delete operations
                    allStudents.push(student);
                });
                
                loadingDiv.style.display = 'none';
                
                if (allStudents.length === 0) {
                    noResultsDiv.style.display = 'block';
                } else {
                    studentTableContainer.style.display = 'block';
                    applyFiltersAndDisplay();
                }
            }, (error) => {
                console.error("Error fetching data:", error);
                loadingDiv.style.display = 'none';
                alert("Error loading student data. Please try again later.");
            });
        }
        
        // Function to apply filters and sort
        function applyFiltersAndDisplay() {
            const searchTerm = document.getElementById('search-input').value.trim().toLowerCase();
            const genderFilter = document.getElementById('gender-filter').value;
            const sortBy = document.getElementById('sort-by').value;
            
            // Apply search and filters
            filteredStudents = allStudents.filter(student => {
                const matchesSearch = !searchTerm || 
                    (student.rollNumber && student.rollNumber.toLowerCase().includes(searchTerm)) || 
                    (student.username && student.username.toLowerCase().includes(searchTerm));
                    
                const matchesGender = !genderFilter || student.gender === genderFilter;
                
                return matchesSearch && matchesGender;
            });
            
            // Apply sorting
            filteredStudents.sort((a, b) => {
                const valueA = (a[sortBy] || '').toLowerCase();
                const valueB = (b[sortBy] || '').toLowerCase();
                return valueA.localeCompare(valueB);
            });
            
            // Reset to first page when filters change
            currentPage = 1;
            
            // Display paginated results
            displayPaginatedStudents();
        }
        
        // Function to display students in the table with pagination
        function displayPaginatedStudents() {
            const tbody = document.getElementById('student-details');
            const noResultsDiv = document.getElementById('no-results');
            
            tbody.innerHTML = '';
            
            if (filteredStudents.length === 0) {
                studentTableContainer.style.display = 'none';
                noResultsDiv.style.display = 'block';
                paginationDiv.innerHTML = '';
                return;
            }
            
            noResultsDiv.style.display = 'none';
            studentTableContainer.style.display = 'block';
            
            // Calculate pagination
            const startIndex = (currentPage - 1) * rowsPerPage;
            const endIndex = Math.min(startIndex + rowsPerPage, filteredStudents.length);
            const pageCount = Math.ceil(filteredStudents.length / rowsPerPage);
            
            // Get current page's data
            const currentPageData = filteredStudents.slice(startIndex, endIndex);
            
            // Create table rows
            const searchTerm = document.getElementById('search-input').value.trim().toLowerCase();
            
            currentPageData.forEach(student => {
                const row = document.createElement('tr');
                
                // Function to highlight matched text if search term exists
                const highlightMatch = (text, term) => {
                    if (!term || !text) return text || 'N/A';
                    
                    // Convert to string in case it's a number
                    text = String(text);
                    
                    // Create a case-insensitive regular expression
                    const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                    return text.replace(regex, '<span class="highlight">$1</span>');
                };
                
                // Generate table cells with highlighting if there's a search term
                const rollNumber = student.rollNumber || 'N/A';
                const regdNumber = student.regdNumber || 'N/A';
                const username = student.username || 'N/A';
                
                row.innerHTML = `
                    <td>${searchTerm ? highlightMatch(rollNumber, searchTerm) : rollNumber}</td>
                    <td>${regdNumber}</td>
                    <td>${searchTerm ? highlightMatch(username, searchTerm) : username}</td>
                    <td>${student.email || 'N/A'}</td>
                    <td>${student.mobile || 'N/A'}</td>
                    <td>${student.gender || 'N/A'}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="edit-btn" data-key="${student.key}" title="Edit">
                                <i class='bx bx-edit-alt'></i>
                            </button>
                            <button class="delete-btn" data-key="${student.key}" data-roll="${student.rollNumber}" title="Delete">
                                <i class='bx bx-trash'></i>
                            </button>
                        </div>
                    </td>
                `;
                
                tbody.appendChild(row);
            });
            
            // Setup pagination controls
            setupPagination(pageCount);
            
            // Add event listeners for action buttons
            setupActionButtons();
        }
        
        // Function to setup pagination controls
        function setupPagination(pageCount) {
            paginationDiv.innerHTML = '';
            
            if (pageCount <= 1) return;
            
            // Previous button
            const prevButton = document.createElement('button');
            prevButton.innerHTML = '<i class="bx bx-chevron-left"></i>';
            prevButton.disabled = currentPage === 1;
            prevButton.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    displayPaginatedStudents();
                }
            });
            paginationDiv.appendChild(prevButton);
            
            // Page buttons
            const maxVisibleButtons = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisibleButtons / 2));
            let endPage = Math.min(pageCount, startPage + maxVisibleButtons - 1);
            
            // Adjust if we're near the end
            if (endPage - startPage + 1 < maxVisibleButtons) {
                startPage = Math.max(1, endPage - maxVisibleButtons + 1);
            }
            
            // First page button if needed
            if (startPage > 1) {
                const firstPageBtn = document.createElement('button');
                firstPageBtn.textContent = '1';
                firstPageBtn.addEventListener('click', () => {
                    currentPage = 1;
                    displayPaginatedStudents();
                });
                paginationDiv.appendChild(firstPageBtn);
                
                if (startPage > 2) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.style.padding = '0 5px';
                    paginationDiv.appendChild(ellipsis);
                }
            }
            
            // Numbered page buttons
            for (let i = startPage; i <= endPage; i++) {
                const pageButton = document.createElement('button');
                pageButton.textContent = i;
                pageButton.classList.toggle('active', i === currentPage);
                pageButton.addEventListener('click', () => {
                    currentPage = i;
                    displayPaginatedStudents();
                });
                paginationDiv.appendChild(pageButton);
            }
            
            // Last page button if needed
            if (endPage < pageCount) {
                if (endPage < pageCount - 1) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.style.padding = '0 5px';
                    paginationDiv.appendChild(ellipsis);
                }
                
                const lastPageBtn = document.createElement('button');
                lastPageBtn.textContent = pageCount;
                lastPageBtn.addEventListener('click', () => {
                    currentPage = pageCount;
                    displayPaginatedStudents();
                });
                paginationDiv.appendChild(lastPageBtn);
            }
            
            // Next button
            const nextButton = document.createElement('button');
            nextButton.innerHTML = '<i class="bx bx-chevron-right"></i>';
            nextButton.disabled = currentPage === pageCount;
            nextButton.addEventListener('click', () => {
                if (currentPage < pageCount) {
                    currentPage++;
                    displayPaginatedStudents();
                }
            });
            paginationDiv.appendChild(nextButton);
        }
        
        // Function to setup action buttons (edit and delete)
        function setupActionButtons() {
            // Delete button event listeners
            document.querySelectorAll('.delete-btn').forEach(button => {
                button.addEventListener('click', function() {
                    const key = this.getAttribute('data-key');
                    const rollNumber = this.getAttribute('data-roll');
                    
                    if (confirm(`Are you sure you want to delete student ${rollNumber}?`)) {
                        deleteStudent(key);
                    }
                });
            });
            
            // Edit button event listeners
            document.querySelectorAll('.edit-btn').forEach(button => {
                button.addEventListener('click', function() {
                    const key = this.getAttribute('data-key');
                    const student = allStudents.find(s => s.key === key);
                    
                    if (student) {
                        // In a real application, you'd open a modal or redirect to an edit page
                        // For now, we'll just alert with the details
                        alert(`Edit functionality would open a form for student ${student.rollNumber}`);
                        
                        // You could redirect to an edit page with the key in the URL:
                        // window.location.href = `editstudent.html?key=${key}`;
                    }
                });
            });
        }
        
        // Function to delete a student
        function deleteStudent(key) {
            const studentRef = ref(db, 'student_register/' + key);
            
            remove(studentRef)
                .then(() => {
                    alert("Student deleted successfully.");
                    // No need to re-fetch, we can update our local array
                    allStudents = allStudents.filter(student => student.key !== key);
                    applyFiltersAndDisplay();
                })
                .catch((error) => {
                    console.error("Error deleting student:", error);
                    alert("Failed to delete student. Please try again.");
                });
        }
        
        // Function to export data to CSV
        function exportToCSV() {
            if (filteredStudents.length === 0) {
                alert("No data to export.");
                return;
            }
            
            // Define headers
            const headers = ['Roll Number', 'Registration Number', 'Username', 'Email', 'Mobile', 'Gender'];
            
            // Create CSV content
            let csvContent = headers.join(',') + '\n';
            
            filteredStudents.forEach(student => {
                const row = [
                    `"${student.rollNumber || ''}"`,
                    `"${student.regdNumber || ''}"`,
                    `"${student.username || ''}"`,
                    `"${student.email || ''}"`,
                    `"${student.mobile || ''}"`,
                    `"${student.gender || ''}"`
                ];
                
                csvContent += row.join(',') + '\n';
            });
            
            // Create and trigger download
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.setAttribute('href', url);
            link.setAttribute('download', `student_data_${new Date().toISOString().slice(0, 10)}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Fetch student details on page load
        document.addEventListener('DOMContentLoaded', () => {
            fetchStudentDetails();
        });
        
        // Add event listeners for search functionality
        document.getElementById('search-button').addEventListener('click', () => {
            applyFiltersAndDisplay();
        });
        
        document.getElementById('search-input').addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                applyFiltersAndDisplay();
            }
        });
        
        document.getElementById('clear-button').addEventListener('click', () => {
            document.getElementById('search-input').value = '';
            document.getElementById('gender-filter').value = '';
            applyFiltersAndDisplay();
        });
        
        // Add event listeners for filters
        document.getElementById('gender-filter').addEventListener('change', applyFiltersAndDisplay);
        document.getElementById('sort-by').addEventListener('change', applyFiltersAndDisplay);
        
        // Add event listener for export button
        document.getElementById('export-button').addEventListener('click', exportToCSV);
    </script>
</body>
</html>
